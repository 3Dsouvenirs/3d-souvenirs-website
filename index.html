<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Souvenirs</title>
</head>
<body>
    <h1>Welcome to 3D Souvenirs!</h1>
    <p>Your one-stop shop for unique 3D printed souvenirs.</p>

    <footer>
        <p>© 2026 3D Souvenirs. All rights reserved.</p>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required><br>
            <label for="question">Question:</label><br>
            <textarea id="question" name="question" required></textarea><br>
            <input type="submit" value="Submit">
        </form>
    </footer>
</body>
</html>
