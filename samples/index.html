<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Souvenirs - Samples Gallery</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2M84R3ZYTQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2M84R3ZYTQ');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .image-container {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            padding: 15px;
            min-height: 400px;
        }

        .gallery-item img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
        }

        .gallery-item-title {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .gallery-item-title a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .gallery-item-title a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3D Souvenirs - 3" Sticker Designs</h1>
        
        <div class="gallery" id="gallery">
            <!-- Gallery items will be generated here -->
        </div>

        <footer>
            <p>&copy; 2026 3D Souvenirs, LLC - Eye-catching lenticular products</p>
        </footer>
    </div>

    <script>
        // List of all GIF files in the samples directory
        const gifFiles = [
            'bear_sticker.gif',
            'blueorange_sticker.gif',
            'carbear_sticker.gif',
            'feedthebear_sticker.gif',
            'fishingbear_sticker.gif',
            'plaid_stickers.gif',
            'raccoon_sticker.gif',
            'roundfox_sticker.gif',
            'usgs_ticker.gif'
        ];

        // Generate gallery items dynamically
        const gallery = document.getElementById('gallery');
        
        gifFiles.forEach(gifFile => {
            // strip any repeated .gif extensions and create readable title
            const fileName = gifFile.replace(/(\.gif)+$/i, '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            const altText = fileName.toLowerCase();
            
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            galleryItem.innerHTML = `
                <div class="image-container">
                    <img src="${gifFile}" alt="${altText}" loading="lazy">
                </div>
                <div class="gallery-item-title">
                    <a href="${gifFile}" download>${gifFile}</a>
                </div>
            `;
            
            gallery.appendChild(galleryItem);
        });
    </script>
</body>
</html>
