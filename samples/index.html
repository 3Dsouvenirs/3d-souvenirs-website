<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:0 auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

h1{
    color:#fff;
    font-size:2.7em;
    margin-bottom:15px;
    text-shadow:2px 2px 4px rgba(0,0,0,.3);
}

.subtitle{
    color:#fff;
    font-size:1.15em;
    margin-bottom:25px;
    opacity:.95;
}

/* Buttons */

.button{
    display:inline-block;
    padding:14px 30px;
    margin:0 8px 15px;
    border-radius:6px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

.home-button{
    background:#fb6b0b;
    color:#fff;
}

.home-button:hover{
    background:#1062ba;
    transform:translateY(-2px);
}

.quote-button{
    background:#fff;
    color:#1062ba;
}

.quote-button:hover{
    background:#f2f2f2;
    transform:translateY(-2px);
}

/* Gallery */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:20px 0;
}

.gallery-item{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 8px 16px rgba(0,0,0,.2);
    transition:.3s;
    display:flex;
    flex-direction:column;
}

.gallery-item:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 24px rgba(0,0,0,.3);
}

.image-container{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8f9fa;
    min-height:400px;
    padding:15px;
}

.gallery-item img{
    max-width:100%;
    max-height:100%;
}

h2{
    color:#fff;
    font-size:2em;
    margin:60px 0 20px;
    text-shadow:2px 2px 4px rgba(0,0,0,.3);
}

footer{
    text-align:center;
    margin:60px 0 20px;
    color:#fff;
}

.bottom-home{
    margin-top:40px;
}

@media(max-width:700px){

.button{
    display:block;
    margin:10px auto;
}

.gallery{
    grid-template-columns:1fr;
}

.image-container{
    min-height:300px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>3D Souvenirs Sample Gallery</h1>

<p class="subtitle">
Explore our collection of custom 3D lenticular magnets, flip stickers and postcards designed for gift shops, attractions and destinations.
</p>

<a href="/" class="button home-button">← Back to Home</a>

<a href="/#contact" class="button quote-button">Request a Quote</a>

</div>
